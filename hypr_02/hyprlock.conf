#########################################################
###-----------------hyprlock_config-------------------###
#########################################################


animations {
    enabled     =   true

    bezier      =   anima,  0.45,   0,  0.55,   1 

    animation   =   fade,               1,      10,     anima
    animation   =   fadeIn,             1,      10,     anima 
    # animation   =   fadeOut,            1,      1,     anima 
    # animation   =   inputField,         1,      1,     anima
    # animation   =   inputFieldColors,   1,      1,     anima 
    # animation   =   inputFieldFade,     1,      1,     anima 
    # animation   =   inputFieldWidth,    1,      1,     anima 
    # animation   =   inputFieldDots,     1,      1,     anima 
}


background {
    monitor     =   
    path        = screenshot
    # color       =   rgba(29, 29, 29, 0.97)
    blur_passes =   3
    blur_size   =   3
    vibrancy    =   3
}


# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d | %m | %Y")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 50
    font_family = frank
    position = 0, 290
    halign = center
    valign = center
}

# Month-day
label {
    monitor =
    # text = cmd[update:1000] echo -e "$(date +"%B | %A")"
    text = cmd[update:1000] echo -e "$(date +"%b | %A")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 20
    font_family = frank
    position = 0, 0
    halign = center
    valign = center
}


# TIME
label {
    monitor =
    text = $TIME
    color = rgba(186, 186, 186, 1.0)
    font_size = 65
    font_family = frank
    position = 0, 100
    halign = center
    valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    # size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Inconsolata NF
    placeholder_text = <i><span foreground="##ffffff99">󰌾 Enter Pass</span></i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}



# LOGO
label {
    monitor =
    text = c 
    color = rgba(186, 186, 186, 1.0)
    font_size = 80
    font_family = starcraftt
    position = 0, -250
    halign = center
    valign = center
}
