###########################################################
###-------------------layerrule-------------------------###
###########################################################

# hyprctl clients -> consulta class de los windows
# hyprctl layers  -> consulta namespace de las capas

###------------------fuzzel_launcher--------------------###
layerrule   =   blur on,                match:namespace launcher
layerrule   =   blur_popups on,         match:namespace launcher
layerrule   =   ignore_alpha 0.2,       match:namespace launcher
layerrule   =   animation popin 10%,    match:namespace launcher

###---------------------eww_widget----------------------###
layerrule   =   animation fade 10%,     match:namespace gtk-layer-shell

###--------------------swaync_notify--------------------###
layerrule   =   blur on,                match:namespace notifications
layerrule   =   blur_popups on,         match:namespace notifications
layerrule   =   ignore_alpha 0.2,       match:namespace notifications
layerrule   =   animation slide 10%,    match:namespace notifications 


###---------------animations_for_layerrule--------------###
# fade      ->  Aparece/desaparece con transparencia
# fadein    ->  Solo animación de entrada (fade)
# fadeout   ->  Solo animación de salida (fade)
# popin     ->  Aparece desde un tamaño pequeño (efecto “zoom con rebote”)
# zoom      ->  Zoom simple, más directo que `popin`
# slide     ->  Se desliza desde una dirección
# slidefade ->  Combina deslizamiento + fade (más suave)


